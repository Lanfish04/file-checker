<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload | FileCheck</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="bg-indigo-900 text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <div class="text-2xl font-bold">FileCheck</div>
      <ul class="flex space-x-6">
        <li><a href="index.html" class="hover:text-indigo-200">Home</a></li>
        <li><a href="dashboard.html" class="hover:text-indigo-200">Dashboard</a></li>
        <li><a href="upload.html" class="hover:text-indigo-200 font-semibold">Upload</a></li>
        <li><a href="login.html" class="hover:text-indigo-200">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Upload Section -->
  <div class="container mx-auto p-8">
    <h2 class="text-3xl font-bold text-indigo-900 mb-6">Upload File</h2>
    <div class="bg-white p-8 rounded-lg shadow-md">
      <div class="border-2 border-dashed border-indigo-300 rounded-lg p-12 text-center mb-6 hover:bg-indigo-50 transition cursor-pointer">
        <input type="file" id="file-upload" class="hidden">
        <label for="file-upload" class="block">
          <svg class="mx-auto h-12 w-12 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          <p class="mt-2 text-indigo-600">Drag & drop files here or click to browse</p>
        </label>
      </div>

      <div class="mb-6">
        <h3 class="font-medium text-gray-700 mb-3">Select Hash Algorithm:</h3>
        <div class="flex space-x-4">
          <label class="inline-flex items-center">
            <input id="selectedAlgorithm" type="radio" name="algorithm" value="blake2b" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500">
            <span class="ml-2">Blake2b</span>
          </label>
          <label class="inline-flex items-center">
            <input id="selectedAlgorithm" type="radio" name="algorithm" value="blake2s" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500">
            <span class="ml-2">Blake2s</span>
          </label>
          <label class="inline-flex items-center">
            <input id="selectedAlgorithm" type="radio" name="algorithm" value="blake3" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500">
            <span class="ml-2">Blake3</span>
          </label>
        </div>
      </div>

      <button id="generate-hash" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition">Generate Hash</button>
      
      <div id="hash-result" class="mt-6 p-4 bg-gray-100 rounded-md font-mono hidden">
        <!-- Hash result will appear here -->
      </div>
    </div>
  </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
  document.getElementById('userForm').addEventListener('submit', function (event) {
  event.preventDefault(); // Mencegah form dikirim secara default

  // Mengambil data dari form
  const formData = new FormData();

  // Mengambil inputan dari form
  const file = document.getElementById('file-upload').files[0]; // Ambil file yang di-upload

  // Menambahkan data ke FormData
  formData.append('username', username);
  formData.append('password', password);
  formData.append('file', file);

  // Mengirim data ke server menggunakan axios
  axios.post('/hash', formData)
    .then(response => {
      console.log('Respons dari server:', response.data); // Menampilkan data respons
    })
    .catch(error => {
      console.error('Terjadi kesalahan:', error); // Menangani kesalahan
    });
});


</script>
</html>
